name: Sync upstream (Tennis Abstract MCP)
on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 03:00 UTC 自动追上游
  workflow_dispatch: {}    # 支持手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge upstream into fork master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/JeffSackmann/tennis_MatchChartingProject.git
          git fetch upstream master
          # merge 而非快进：fork 带有 workflow 提交（上游无），快进永远失败；
          # 上游只动 CSV、fork 只有 workflow 文件，合并永远无冲突可全自动
          git merge upstream/master --no-edit
          git push origin master
